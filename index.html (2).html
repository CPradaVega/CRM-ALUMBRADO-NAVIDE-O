*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
body{background:var(--bg,#f1f5f9)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}

.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.pass-wrap{position:relative}

.eye-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:0;font-weight:400}
.cfg-section{background:#f8fafc;border-radius:10px;padding:16px;margin-bottom:16px}

// HELPERS UI

function togglePass(inputId,btnId){
  var el=document.getElementById(inputId);
  if(!el)return;
  el.type=el.type==="password"?"text":"password";
  var b=document.getElementById(btnId);
  if(b)b.textContent=el.type==="password"?"👁️":"🙈";
}
function gv(id){var e=document.getElementById(id);return e?e.value:"";}
function sello(){return '<div class="sello">🏷️ Generado por César Prada · ESSA Alumbrado Navideño · Sistema de Gestión Comercial Interno</div>';}
function fld(id,lbl,val,tipo){val=val||"";tipo=tipo||"text";return '<div class="field"><label>'+lbl+'</label><input id="'+id+'" type="'+tipo+'" value="'+val+'"/></div>';}
function txta(id,lbl,val){return '<div class="field"><label>'+lbl+'</label><textarea id="'+id+'" rows="3">'+(val||"")+'</textarea></div>';}
function sel(id,lbl,opts,val){var ops=opts.map(function(o){return '<option value="'+o+'"'+(o===val?" selected":"")+">"+o+"</option>";}).join("");return '<div class="field"><label>'+lbl+'</label><select id="'+id+'">'+ops+'</select></div>';}
function selObj(id,lbl,opts,val){var ops=opts.map(function(o){return '<option value="'+o.value+'"'+(String(o.value)===String(val)?" selected":"")+">"+o.label+"</option>";}).join("");return '<div class="field"><label>'+lbl+'</label><select id="'+id+'">'+ops+'</select></div>';}
function fotoInput(inputId,previewId,actual){
  var prev=actual?'<img src="'+actual+'" class="photo-circle" id="'+previewId+'"/>':"<div style='width:64px;height:64px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:26px' id='"+previewId+"'>👤</div>";
  return '<div class="field"><label>Foto</label><div style="display:flex;align-items:center;gap:12px">'+prev+'<label class="upload-btn">📷 Cargar foto<input type="file" accept="image/*" style="display:none" onchange="previewFoto(this,\''+previewId+'\',\''+inputId+'\')"/></label></div><input type="hidden" id="'+inputId+'" value="'+(actual||"")+'"/></div>';
}
function previewFoto(input,previewId,hiddenId){
  var file=input.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    var b64=e.target.result;
    document.getElementById(hiddenId).value=b64;
    var prev=document.getElementById(previewId);
    if(prev){prev.outerHTML='<img src="'+b64+'" class="photo-circle" id="'+previewId+'"/>';}
  };
  r.readAsDataURL(file);
}
function logoInput(inputId,previewId,actual){
  var prev=actual?'<img src="'+actual+'" style="max-height:60px;max-width:160px;border-radius:8px" id="'+previewId+'"/>':"<div style='padding:8px 14px;background:#f1f5f9;border-radius:8px;color:#64748b;font-size:12px' id='"+previewId+"'>Sin logo</div>";
  return '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">'+prev+'<label class="upload-btn">🖼️ Cargar logo<input type="file" accept="image/*" style="display:none" onchange="previewLogo(this,\''+previewId+'\',\''+inputId+'\')"/></label></div><input type="hidden" id="'+inputId+'" value="'+(actual||"")+'" />';
}
function previewLogo(input,previewId,hiddenId){
  var file=input.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    var b64=e.target.result;
    document.getElementById(hiddenId).value=b64;
    var prev=document.getElementById(previewId);
    if(prev)prev.outerHTML='<img src="'+b64+'" style="max-height:60px;max-width:160px;border-radius:8px" id="'+previewId+'"/>';
  };
  r.readAsDataURL(file);
}
function exportCSV(data,nombre){
  if(!data.length)return;
  var cols=Object.keys(data[0]).filter(function(k){return k!=="foto";});
  var csv=[cols.join(",")].concat(data.map(function(r){return cols.map(function(c){var v=r[c];return '"'+(Array.isArray(v)?v.join("|"):(v==null?"":v))+'"';}).join(",");})).join("\n");
  var a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));
  a.download="essa_"+nombre+"_"+new Date().toISOString().slice(0,10)+".csv";
  a.click();
}

    '<div class="chart-grid"><div class="card"><div style="font-weight:700;color:var(--primary);margin-bottom:12px">Por Segmento (M COP)</div><canvas id="ch-s" height="160"></canvas></div><div class="card"><div style="font-weight:700;color:var(--primary);margin-bottom:12px">Por Tipo de Oferta</div><canvas id="ch-t" height="160"></canvas></div></div>'+

function hacerMapa(){
  var o=DB.oportunidades;var W=640,H=240;
  var lats=o.map(function(x){return x.lat;}),lngs=o.map(function(x){return x.lng;});
  var minLat=Math.min.apply(null,lats)-.05,maxLat=Math.max.apply(null,lats)+.05;
  var minLng=Math.min.apply(null,lngs)-.05,maxLng=Math.max.apply(null,lngs)+.05;
  var toX=function(lng){return((lng-minLng)/(maxLng-minLng))*(W-60)+30;};
  var toY=function(lat){return H-((lat-minLat)/(maxLat-minLat))*(H-60)-30;};
  var circles=o.map(function(x){var cl=DB.clientes.find(function(c){return c.id===x.clienteId;});var cx=toX(x.lng).toFixed(1),cy=toY(x.lat).toFixed(1);return'<circle cx="'+cx+'" cy="'+cy+'" r="14" fill="'+ESTADOS[x.estado]+'" stroke="#fff" stroke-width="2" opacity=".9"/><text x="'+cx+'" y="'+(+cy+4)+'" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">'+x.id.replace("OPP-","")+'</text><text x="'+cx+'" y="'+(+cy+22)+'" text-anchor="middle" fill="#1e293b" font-size="9">'+(cl?cl.ciudad:"")+'</text>';}).join("");
  return'<svg width="'+W+'" height="'+H+'" style="background:#dbeafe;border-radius:8px;border:1px solid #bfdbfe">'+circles+'</svg>';
}

// ═══════════════════════════════════════
// GUARDAR / CARGAR JSON
// ═══════════════════════════════════════
function guardarJSON(){
  var datos={DB:DB,CFG:CFG,version:"1.0",fecha:new Date().toISOString()};
  var json=JSON.stringify(datos,null,2);
  var a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([json],{type:"application/json"}));
  a.download="crm_essa_"+new Date().toISOString().slice(0,10)+".json";
  a.click();
  alert("✅ Datos guardados correctamente.\nGuarda el archivo .json en un lugar seguro.");
}
function cargarJSON(input){
  var file=input.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var datos=JSON.parse(e.target.result);
      if(datos.DB)DB=datos.DB;
      if(datos.CFG)CFG=datos.CFG;
      aplicarColores();
      actualizarLogoSidebar();
      irA(paginaActual||"dashboard");
      alert("✅ Datos cargados correctamente.");
    }catch(err){
      alert("❌ Error al leer el archivo. Asegúrate de cargar un archivo JSON válido del CRM ESSA.");
    }
  };
  r.readAsText(file);
  input.value="";
}
